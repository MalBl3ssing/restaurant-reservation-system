<!DOCTYPE html>
<html>
<head>
    <title>Smart Restaurant App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

    <div class="slider">
        <img src="images/food1.jpg" class="slide active">
        <img src="images/food2.jpg" class="slide">
        <img src="images/food3.jpg" class="slide">
        </div>

    <div class="overlay">

        <div class="navbar">
            <h2>🍽 Restaurant App</h2>

            <div>
                <a href="pages/restaurants.html">Restaurants</a>
                <a href="pages/login.html">Login</a>
                <a href="pages/help.html">Help</a>
            </div>
        </div>

        <h1>🍽 Smart Restaurant App</h1>
        <p>Find amazing restaurants near you</p>
        <p>Book tables and order food easily</p>
         <a href="pages/restaurants.html"><button>Find Restaurants</button></a>
        <a href="pages/login.html"><button>Login</button></a>
        <a href="pages/register.html"><button>Register</button></a>

        <div class="info-box">
            <h3>Why Choose Us?</h3>
            <p>✔ Fast restaurant booking</p>
            <p>✔ Easy food ordering</p>
            <p>✔ Best restaurants near you</p>
        </div>

    </div>

</div>

<script>
let slides = document.querySelectorAll('.slide');
let i = 0;
setInterval(() => {
    slides[i].classList.remove('active');
    i = (i + 1) % slides.length;
    slides[i].classList.add('active');
}, 3000);
</script>

</body>
</html>
